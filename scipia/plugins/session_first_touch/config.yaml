# Configuración del Plugin Session First Touch
universe:
  target_assets:
    - "NVDA"
    - "AAPL"
    - "MSFT"
    - "AMZN"
    - "META"
    - "GOOG"
    - "TSLA"
    - "ACS.MC"
    - "PHAG.AS"
    - "BTC-USD"
    - "EURUSD=X"
  context_assets:
    - "SPY"
    - "QQQ"
    - "IWM"
    - "^VIX"
    - "DX-Y.NYB"
    - "^TNX"

parameters:
  risk:
    capital_eur: 24000
    risk_per_trade_pct: 0.01
    max_risk_eur: 100
    min_notional_eur: 2500
    min_rr: 2.0
  conformal:
    alpha: 0.1
    min_oos_hit_rate: 0.52
    min_oos_expectancy: 0.05
  execution:
    top_n: 3
    strict_top_n: false
    horizon_bars: 12
    atr_window: 14
    use_llf: true
  costs:
    usa: {commission: 1.5, slippage_atr: 0.05}
    europe: {commission: 8.0, slippage_atr: 0.10}
    forex: {commission: 2.0, slippage_atr: 0.03}
    crypto: {commission: 5.0, slippage_atr: 0.15}
